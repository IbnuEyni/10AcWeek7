kind: DataContract
apiVersion: v3.0.0
id: week3-document-refinery-extractions
info:
  title: Week 3 Document Refinery — Extraction Records
  version: 1.0.0
  owner: week3-team
  description: One record per processed document. Contains extracted facts and entities.
servers:
  local:
    type: local
    path: outputs/week3/extractions.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: All confidence fields must remain in 0.0-1.0 float range.
schema:
  doc_id:
    type: string
    required: true
    format: uuid
    description: Primary key. UUIDv4. Stable across re-extractions of the same source.
    unique: true
  entities:
    type: array
    required: true
  entities[*].canonical_value:
    type: string
    required: true
  entities[*].entity_id:
    type: string
    required: true
    format: uuid
  entities[*].name:
    type: string
    required: true
  entities[*].type:
    type: string
    required: true
    enum:
    - PERSON
    - ORG
    - LOCATION
    - DATE
    - AMOUNT
    - OTHER
  extracted_at:
    type: string
    required: true
    format: iso8601
    description: ISO 8601 timestamp of when extraction completed.
  extracted_facts:
    type: array
    required: true
  extracted_facts[*].confidence:
    type: number
    required: true
    minimum: 0.0
    maximum: 1.0
    description: Confidence score. MUST be float 0.0-1.0. BREAKING CHANGE if changed
      to 0-100.
  extracted_facts[*].entity_refs:
    type: array
    required: true
  extracted_facts[*].fact_id:
    type: string
    required: true
    format: uuid
    unique: true
  extracted_facts[*].page_ref:
    type: integer
    minimum: 0.0
    maximum: 15.0
  extracted_facts[*].source_excerpt:
    type: string
    required: true
  extracted_facts[*].text:
    type: string
    required: true
  extraction_model:
    type: string
    required: true
    description: Model identifier. Must match pattern claude-* or gpt-*.
    pattern: ^(claude|gpt)-
  processing_time_ms:
    type: integer
    required: true
    minimum: 200.0
    maximum: 1082881.0
    description: Wall-clock extraction time in milliseconds. Positive integer.
  source_hash:
    type: string
    required: true
    format: sha256
    description: SHA-256 of the source file. Changes iff the source content changes.
    pattern: ^[a-f0-9]{64}$
  source_path:
    type: string
    required: true
    format: path
    description: Absolute path or URL to the source document.
  token_count.input:
    type: integer
    required: true
    minimum: 200.0
    maximum: 18400.0
  token_count.output:
    type: integer
    required: true
    minimum: 50.0
    maximum: 4200.0
quality:
  type: SodaChecks
  specification:
    checks:
    - missing_count(doc_id) = 0
    - missing_count(entities) = 0
    - missing_count(extracted_at) = 0
    - missing_count(extracted_facts) = 0
    - missing_count(extraction_model) = 0
    - missing_count(processing_time_ms) = 0
    - missing_count(source_hash) = 0
    - missing_count(source_path) = 0
    - missing_count(token_count.input) = 0
    - missing_count(token_count.output) = 0
    - duplicate_count(doc_id) = 0
    - min(extracted_facts_confidence_min) >= 0.0
    - max(extracted_facts_confidence_max) <= 1.0
    - row_count >= 1
lineage:
  upstream: []
  downstream:
  - id: week4-brownfield-cartographer
    description: week4-brownfield-cartographer consumes fields from this contract
    fields_consumed:
    - doc_id
    - extracted_facts
    - extraction_model
    breaking_if_changed:
    - extracted_facts[*].confidence
    - doc_id
llm_annotations:
- column: entities
  source: week3_extractions
  description: 'Auto-profiled column. Type: array, cardinality: 64.'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: entities[*].canonical_value
  source: week3_extractions
  description: 'Auto-profiled column. Type: string, cardinality: 15. Sample values:
    [''2013-e.c-audit-finding-information'', ''2022_audited_financial_statement_report'',
    ''2018_audited_financial_statement_report'']'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: entities[*].name
  source: week3_extractions
  description: 'Auto-profiled column. Type: string, cardinality: 15. Sample values:
    [''2019 Audited Financial Statement Report'', ''Quarter'', ''2013-E.C-Audit-finding-information'']'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: entities[*].type
  source: week3_extractions
  description: 'Categorical type field. Observed values: [''OTHER'', ''PERSON'']'
  business_rule: value in ['OTHER', 'PERSON']
  annotation_method: heuristic (no LLM API key configured)
- column: extracted_facts
  source: week3_extractions
  description: 'Auto-profiled column. Type: array, cardinality: 64.'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: extracted_facts[*].confidence
  source: week3_extractions
  description: Confidence score for the parent operation. Float 0.0-1.0 where 1.0
    is highest confidence.
  business_rule: 0.0 <= value <= 1.0
  annotation_method: heuristic (no LLM API key configured)
- column: extracted_facts[*].entity_refs
  source: week3_extractions
  description: 'Auto-profiled column. Type: array, cardinality: 64.'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: extracted_facts[*].page_ref
  source: week3_extractions
  description: 'Auto-profiled column. Type: integer, cardinality: 2.'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: extracted_facts[*].source_excerpt
  source: week3_extractions
  description: 'Auto-profiled column. Type: string, cardinality: 7. Sample values:
    [''|  |  |  | \n--------------------------------------------------\n |  |  |  |
    \n |  |  |  | \n |  |  |  | \n |  |  |  | \n |  |  |  | \n |  |  |  | \n |  |  |  |
    \n |  |  |  | \n |  |  |  |'', ''Issue No. 25/2017 July EFY2017 Page 1\n--------------------------------------------------\n1.
    Summary\nThe Consumer Price Index (CPI), a key economic statistics, is surveyed,
    analyzed, and\nmade available to data users on a monthly basis.\nThe year-on-year,
    general inflation rate (annual percentage chang'', ''Processed via vision_augmented
    strategy'']'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: extracted_facts[*].text
  source: week3_extractions
  description: 'Auto-profiled column. Type: string, cardinality: 16. Sample values:
    [''|  |  |  | \n--------------------------------------------------\n |  |  |  |
    \n |  |  |  | \n |  |  |  | \n |  |  |  | \n |  |  |  | \n |  |  |  | \n |  |  |  |
    \n |  |  |  | \n |  |  |  |'', ''Document processed: 2019_Audited_Financial_Statement_Report.pdf'',
    ''Document processed: 2013-E.C-Procurement-information.pdf'']'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: extraction_model
  source: week3_extractions
  description: Model identifier. Must match known model naming pattern.
  business_rule: matches pattern ^(claude|gpt)-
  cross_column: Determines extraction strategy and cost profile
  annotation_method: heuristic (no LLM API key configured)
- column: processing_time_ms
  source: week3_extractions
  description: 'Auto-profiled column. Type: integer, cardinality: 55.'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: source_path
  source: week3_extractions
  description: File system or URL path reference.
  business_rule: non-empty string
  annotation_method: heuristic (no LLM API key configured)
- column: token_count.input
  source: week3_extractions
  description: Token count metric for LLM operations. Must be non-negative integer.
  business_rule: value >= 0
  annotation_method: heuristic (no LLM API key configured)
- column: token_count.output
  source: week3_extractions
  description: Token count metric for LLM operations. Must be non-negative integer.
  business_rule: value >= 0
  annotation_method: heuristic (no LLM API key configured)
