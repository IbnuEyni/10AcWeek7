version: 2
models:
- name: week2_verdicts
  description: dbt schema for week2-digital-courtroom-verdicts
  columns:
  - name: confidence
    description: Confidence score. MUST be float 0.0-1.0. BREAKING CHANGE if changed
      to 0-100.
    tests:
    - not_null
  - name: evaluated_at
    description: ISO 8601 timestamp of when evaluation completed.
    tests:
    - not_null
  - name: overall_score
    description: Weighted average of all criterion scores. Float.
    tests:
    - not_null
  - name: overall_verdict
    description: 'Final verdict. Must be exactly one of: PASS, FAIL, WARN.'
    tests:
    - not_null
    - accepted_values:
        values:
        - PASS
        - FAIL
        - WARN
  - name: rubric_id
    description: SHA-256 hash of the rubric YAML used for evaluation.
    tests:
    - not_null
  - name: rubric_version
    description: Semantic version of the rubric (e.g. 3.0.0).
    tests:
    - not_null
  - name: scores_chief_justice_synthesis_evidence
    description: ''
