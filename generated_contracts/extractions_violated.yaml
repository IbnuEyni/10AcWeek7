kind: DataContract
apiVersion: v3.0.0
id: custom-extractions_violated
info:
  title: Custom Contract — extractions_violated
  version: 1.0.0
  owner: platform-team
  description: Auto-generated contract for extractions_violated
servers:
  local:
    type: local
    path: outputs/week3/extractions_violated.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: All confidence fields must remain in 0.0-1.0 float range.
schema:
  doc_id:
    type: string
    required: true
    format: uuid
    description: Primary key. UUIDv4. Stable across re-extractions of the same source.
  entities:
    type: array
    required: true
  entities[*].canonical_value:
    type: string
    required: true
  entities[*].entity_id:
    type: string
    required: true
    format: uuid
  entities[*].name:
    type: string
    required: true
  entities[*].type:
    type: string
    required: true
  extracted_at:
    type: string
    required: true
    format: iso8601
    description: ISO 8601 timestamp of when extraction completed.
  extracted_facts:
    type: array
    required: true
  extracted_facts[*].confidence:
    type: number
    required: true
    minimum: 50.0
    maximum: 98.8
  extracted_facts[*].entity_refs:
    type: array
    required: true
  extracted_facts[*].fact_id:
    type: string
    required: true
    format: uuid
  extracted_facts[*].page_ref:
    type: integer
    minimum: 1.0
    maximum: 20.0
  extracted_facts[*].source_excerpt:
    type: string
    required: true
  extracted_facts[*].text:
    type: string
    required: true
  extraction_model:
    type: string
    required: true
    description: Model identifier. Must match pattern claude-* or gpt-*.
    pattern: ^(claude|gpt)-
  processing_time_ms:
    type: integer
    required: true
    minimum: 268.0
    maximum: 4851.0
    description: Wall-clock extraction time in milliseconds. Positive integer.
  source_hash:
    type: string
    required: true
    format: sha256
    description: SHA-256 of the source file. Changes iff the source content changes.
    pattern: ^[a-f0-9]{64}$
  source_path:
    type: string
    required: true
    format: path
    description: Absolute path or URL to the source document.
  token_count.input:
    type: integer
    required: true
    minimum: 1096.0
    maximum: 7846.0
  token_count.output:
    type: integer
    required: true
    minimum: 202.0
    maximum: 1952.0
quality:
  type: SodaChecks
  specification:
    checks:
    - missing_count(doc_id) = 0
    - missing_count(entities) = 0
    - missing_count(extracted_at) = 0
    - missing_count(extracted_facts) = 0
    - missing_count(extraction_model) = 0
    - missing_count(processing_time_ms) = 0
    - missing_count(source_hash) = 0
    - missing_count(source_path) = 0
    - missing_count(token_count.input) = 0
    - missing_count(token_count.output) = 0
    - row_count >= 1
lineage:
  upstream: []
  downstream: []
llm_annotations:
- column: entities
  source: extractions_violated
  description: 'Auto-profiled column. Type: array, cardinality: 55.'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: entities[*].canonical_value
  source: extractions_violated
  description: 'Auto-profiled column. Type: string, cardinality: 6. Sample values:
    [''new_york'', ''5000'', ''acme_corp'']'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: entities[*].name
  source: extractions_violated
  description: 'Auto-profiled column. Type: string, cardinality: 6. Sample values:
    [''$5000'', ''Jane Doe'', ''Acme Corp'']'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: entities[*].type
  source: extractions_violated
  description: 'Categorical type field. Observed values: [''ORG'', ''OTHER'', ''AMOUNT'',
    ''LOCATION'', ''DATE'']'
  business_rule: value in ['ORG', 'OTHER', 'AMOUNT', 'LOCATION', 'DATE']
  annotation_method: heuristic (no LLM API key configured)
- column: extracted_facts
  source: extractions_violated
  description: 'Auto-profiled column. Type: array, cardinality: 55.'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: extracted_facts[*].confidence
  source: extractions_violated
  description: Confidence score for the parent operation. Float 0.0-1.0 where 1.0
    is highest confidence.
  business_rule: 0.0 <= value <= 1.0
  annotation_method: heuristic (no LLM API key configured)
- column: extracted_facts[*].entity_refs
  source: extractions_violated
  description: 'Auto-profiled column. Type: array, cardinality: 140.'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: extracted_facts[*].page_ref
  source: extractions_violated
  description: 'Auto-profiled column. Type: integer, cardinality: 20.'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: extracted_facts[*].source_excerpt
  source: extractions_violated
  description: 'Auto-profiled column. Type: string, cardinality: 5. Sample values:
    [''Verbatim excerpt 5 from source document'', ''Verbatim excerpt 2 from source
    document'', ''Verbatim excerpt 1 from source document'']'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: extracted_facts[*].text
  source: extractions_violated
  description: 'Auto-profiled column. Type: string, cardinality: 25. Sample values:
    [''Extracted fact 2: Revenue increased by 15%'', ''Extracted fact 2: Contract
    signed on Jan 15'', ''Extracted fact 1: Approved by Jane Doe'']'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: extraction_model
  source: extractions_violated
  description: Model identifier. Must match known model naming pattern.
  business_rule: matches pattern ^(claude|gpt)-
  cross_column: Determines extraction strategy and cost profile
  annotation_method: heuristic (no LLM API key configured)
- column: processing_time_ms
  source: extractions_violated
  description: 'Auto-profiled column. Type: integer, cardinality: 54.'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: source_path
  source: extractions_violated
  description: File system or URL path reference.
  business_rule: non-empty string
  annotation_method: heuristic (no LLM API key configured)
- column: token_count.input
  source: extractions_violated
  description: Token count metric for LLM operations. Must be non-negative integer.
  business_rule: value >= 0
  annotation_method: heuristic (no LLM API key configured)
- column: token_count.output
  source: extractions_violated
  description: Token count metric for LLM operations. Must be non-negative integer.
  business_rule: value >= 0
  annotation_method: heuristic (no LLM API key configured)
