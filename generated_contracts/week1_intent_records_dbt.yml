version: 2
models:
- name: week1_intent_records
  description: dbt schema for week1-intent-code-correlator
  columns:
  - name: code_refs
    description: ''
    tests:
    - not_null
  - name: created_at
    description: ISO 8601 timestamp of when the intent was recorded.
    tests:
    - not_null
  - name: description
    description: Plain-English statement of the developer intent.
    tests:
    - not_null
  - name: governance_tags
    description: ''
    tests:
    - not_null
  - name: intent_id
    description: Primary key. UUIDv4. One per intent-code mapping.
    tests:
    - not_null
    - unique
