version: 2
models:
- name: week5_events
  description: dbt schema for week5-event-sourcing-platform-events
  columns:
  - name: aggregate_id
    description: Identifier of the aggregate this event belongs to.
    tests:
    - not_null
  - name: aggregate_type
    description: PascalCase aggregate type (e.g. LoanApplication, AgentSession).
    tests:
    - not_null
  - name: event_id
    description: Primary key. UUIDv4. Globally unique event identifier.
    tests:
    - not_null
    - unique
  - name: event_type
    description: PascalCase event type. Must be registered in schema registry.
    tests:
    - not_null
  - name: metadata_causation_id
    description: ''
    tests: []
  - name: metadata_correlation_id
    description: ''
    tests:
    - not_null
  - name: metadata_source_service
    description: ''
    tests:
    - not_null
  - name: metadata_user_id
    description: ''
    tests:
    - not_null
  - name: occurred_at
    description: ISO 8601 timestamp of when the event occurred in the domain.
    tests:
    - not_null
  - name: recorded_at
    description: ISO 8601 timestamp of when the event was persisted. Must be >= occurred_at.
    tests:
    - not_null
  - name: schema_version
    description: Schema version of the event payload.
    tests:
    - not_null
  - name: sequence_number
    description: Monotonically increasing per aggregate_id. Starts at 1.
    tests:
    - not_null
  tests:
  - dbt_utils.expression_is_true:
      expression: recorded_at >= occurred_at
