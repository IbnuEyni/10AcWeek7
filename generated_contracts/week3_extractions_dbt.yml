version: 2
models:
- name: week3_extractions
  description: dbt schema for week3-document-refinery-extractions
  columns:
  - name: doc_id
    description: Primary key. UUIDv4. Stable across re-extractions of the same source.
    tests:
    - not_null
  - name: entities
    description: ''
    tests:
    - not_null
  - name: extracted_at
    description: ISO 8601 timestamp of when extraction completed.
    tests:
    - not_null
  - name: extracted_facts
    description: ''
    tests:
    - not_null
  - name: extraction_model
    description: Model identifier. Must match pattern claude-* or gpt-*.
    tests:
    - not_null
  - name: processing_time_ms
    description: Wall-clock extraction time in milliseconds. Positive integer, no
      upper bound.
    tests:
    - not_null
  - name: source_hash
    description: SHA-256 of the source file. Changes iff the source content changes.
    tests:
    - not_null
  - name: source_path
    description: Absolute path or URL to the source document.
    tests:
    - not_null
  - name: token_count_input
    description: ''
    tests:
    - not_null
  - name: token_count_output
    description: ''
    tests:
    - not_null
  - name: extracted_facts_entity_refs
    description: 'Foreign key: extracted_facts[*].entity_refs references entities[*].entity_id'
    tests:
    - relationships:
        to: ref('week3_extractions')
        field: entities_entity_id
