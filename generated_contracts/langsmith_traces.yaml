kind: DataContract
apiVersion: v3.0.0
id: langsmith-trace-records
info:
  title: LangSmith Trace Export — Run Records
  version: 1.0.0
  owner: platform-team
  description: One record per LLM/chain/tool run. Contains token counts, costs, and
    timing.
servers:
  local:
    type: local
    path: outputs/traces/runs.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: All confidence fields must remain in 0.0-1.0 float range.
schema:
  completion_tokens:
    type: integer
    required: true
    minimum: 0
    description: Completion token count. Must be non-negative integer.
  end_time:
    type: string
    required: true
    format: iso8601
  error:
    type: 'null'
  id:
    type: string
    required: true
    format: uuid
    unique: true
  inputs.criterion:
    type: string
  inputs.doc_id:
    type: string
  inputs.evidence:
    type: string
  inputs.repo_url:
    type: string
    format: url
  inputs.strategy:
    type: string
  inputs.target:
    type: string
  name:
    type: string
    required: true
  outputs.argument:
    type: string
  outputs.confidence:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: Confidence score. MUST be float 0.0-1.0. BREAKING CHANGE if changed
      to 0-100.
  outputs.overall_score:
    type: number
    minimum: 3.5
    maximum: 5.0
  outputs.score:
    type: integer
    minimum: 1.0
    maximum: 5.0
  parent_run_id:
    type: string
  prompt_tokens:
    type: integer
    required: true
    minimum: 0
    description: Prompt token count. Must be non-negative integer.
  run_type:
    type: string
    required: true
    enum:
    - llm
    - chain
    - tool
    - retriever
    - embedding
  session_id:
    type: string
    required: true
  start_time:
    type: string
    required: true
    format: iso8601
  tags:
    type: array
    required: true
  total_cost:
    type: number
    required: true
    minimum: 0.0
    description: Monetary cost in USD. Must be non-negative.
  total_tokens:
    type: integer
    required: true
    minimum: 0
    description: Total token count. Must equal prompt_tokens + completion_tokens.
quality:
  type: SodaChecks
  specification:
    checks:
    - missing_count(completion_tokens) = 0
    - missing_count(end_time) = 0
    - missing_count(id) = 0
    - missing_count(name) = 0
    - missing_count(prompt_tokens) = 0
    - missing_count(run_type) = 0
    - missing_count(session_id) = 0
    - missing_count(start_time) = 0
    - missing_count(tags) = 0
    - missing_count(total_cost) = 0
    - missing_count(total_tokens) = 0
    - duplicate_count(id) = 0
    - min(outputs.confidence_min) >= 0.0
    - max(outputs.confidence_max) <= 1.0
    - row_count >= 1
lineage:
  upstream: []
  downstream: []
llm_annotations:
- column: completion_tokens
  source: langsmith_traces
  description: Token count metric for LLM operations. Must be non-negative integer.
  business_rule: value >= 0
  annotation_method: heuristic (no LLM API key configured)
- column: error
  source: langsmith_traces
  description: 'Auto-profiled column. Type: null, cardinality: 0.'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: inputs.criterion
  source: langsmith_traces
  description: 'Auto-profiled column. Type: string, cardinality: 5. Sample values:
    [''evidence_aggregator'', ''defense'', ''chief_justice'']'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: inputs.evidence
  source: langsmith_traces
  description: 'Auto-profiled column. Type: string, cardinality: 10. Sample values:
    [''Mode: Full, LLM: True'', ''Generated FDE Day-One onboarding brief'', ''Total
    time: 149.80s, Nodes: 179, Edges: 65'']'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: inputs.repo_url
  source: langsmith_traces
  description: 'Auto-profiled column. Type: string, cardinality: 1. Sample values:
    [''https://github.com/IbnuEyni/10Acweek2'']'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: inputs.strategy
  source: langsmith_traces
  description: 'Auto-profiled column. Type: string, cardinality: 2. Sample values:
    [''layout_aware'', ''vision_augmented'']'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: inputs.target
  source: langsmith_traces
  description: 'Auto-profiled column. Type: string, cardinality: 5. Sample values:
    [''KnowledgeGraph'', ''/home/shuaib/Desktop/python/10Acd/10AcWeek4/dbt-core/tests/functional/snapshots'',
    ''/home/shuaib/Desktop/python/10Acd/10AcWeek4/dbt-core/tests/functional/snapshots/.cartography/CODEBASE.md'']'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: name
  source: langsmith_traces
  description: 'Auto-profiled column. Type: string, cardinality: 15. Sample values:
    [''Orchestrator.initialize_graph'', ''Orchestrator.complete_analysis'', ''Archivist.build_semantic_index'']'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: outputs.argument
  source: langsmith_traces
  description: 'Auto-profiled column. Type: string, cardinality: 5. Sample values:
    [''evidence_aggregator opinion'', ''defense opinion'', ''tech_lead opinion'']'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: outputs.confidence
  source: langsmith_traces
  description: Confidence score for the parent operation. Float 0.0-1.0 where 1.0
    is highest confidence.
  business_rule: 0.0 <= value <= 1.0
  annotation_method: heuristic (no LLM API key configured)
- column: outputs.overall_score
  source: langsmith_traces
  description: Evaluation score from rubric-based assessment.
  business_rule: 1 <= value <= 5 (integer)
  annotation_method: heuristic (no LLM API key configured)
- column: outputs.score
  source: langsmith_traces
  description: Rubric criterion score. Integer 1-5 where 5 is highest.
  business_rule: 1 <= value <= 5 (integer)
  annotation_method: heuristic (no LLM API key configured)
- column: prompt_tokens
  source: langsmith_traces
  description: Token count metric for LLM operations. Must be non-negative integer.
  business_rule: value >= 0
  annotation_method: heuristic (no LLM API key configured)
- column: run_type
  source: langsmith_traces
  description: 'Categorical type field. Observed values: [''llm'', ''chain'']'
  business_rule: value in ['llm', 'chain']
  annotation_method: heuristic (no LLM API key configured)
- column: tags
  source: langsmith_traces
  description: 'Auto-profiled column. Type: array, cardinality: 11.'
  business_rule: See contract schema for constraints
  annotation_method: heuristic (no LLM API key configured)
- column: total_cost
  source: langsmith_traces
  description: Monetary cost in USD for the operation.
  business_rule: value >= 0.0
  annotation_method: heuristic (no LLM API key configured)
- column: total_tokens
  source: langsmith_traces
  description: Token count metric for LLM operations. Must be non-negative integer.
  business_rule: value >= 0
  annotation_method: heuristic (no LLM API key configured)
