version: 2
models:
- name: langsmith_traces
  description: dbt schema for langsmith-trace-records
  columns:
  - name: completion_tokens
    description: Completion token count. Must be non-negative integer.
    tests:
    - not_null
  - name: end_time
    description: ''
    tests:
    - not_null
  - name: error
    description: ''
    tests: []
  - name: id
    description: ''
    tests:
    - not_null
    - unique
  - name: inputs_criterion
    description: ''
    tests: []
  - name: inputs_doc_id
    description: ''
    tests: []
  - name: inputs_evidence
    description: ''
    tests: []
  - name: inputs_repo_url
    description: ''
    tests: []
  - name: inputs_strategy
    description: ''
    tests: []
  - name: inputs_target
    description: ''
    tests: []
  - name: name
    description: ''
    tests:
    - not_null
  - name: outputs_argument
    description: ''
    tests: []
  - name: outputs_confidence
    description: Confidence score. MUST be float 0.0-1.0. BREAKING CHANGE if changed
      to 0-100.
    tests: []
  - name: outputs_overall_score
    description: ''
    tests: []
  - name: outputs_score
    description: ''
    tests: []
  - name: parent_run_id
    description: ''
    tests: []
  - name: prompt_tokens
    description: Prompt token count. Must be non-negative integer.
    tests:
    - not_null
  - name: run_type
    description: ''
    tests:
    - not_null
    - accepted_values:
        values:
        - llm
        - chain
        - tool
        - retriever
        - embedding
  - name: session_id
    description: ''
    tests:
    - not_null
  - name: start_time
    description: ''
    tests:
    - not_null
  - name: tags
    description: ''
    tests:
    - not_null
  - name: total_cost
    description: Monetary cost in USD. Must be non-negative.
    tests:
    - not_null
  - name: total_tokens
    description: Total token count. Must equal prompt_tokens + completion_tokens.
    tests:
    - not_null
  tests:
  - dbt_utils.expression_is_true:
      expression: end_time >= start_time
  - dbt_utils.expression_is_true:
      expression: total_tokens = prompt_tokens + completion_tokens
